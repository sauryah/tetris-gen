<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TETRIS GEN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>
<body>
  <div id="game-container">
    <div id="top-bar">
      <span id="player-name"></span>
      <button id="login-btn" class="bar-btn">LOGIN</button>
      <button id="logout-btn" class="bar-btn" style="display:none">LOGOUT</button>
      <button id="scores-btn" class="bar-btn">SCORES</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="sound-hint">M - toggle sound</div>
  </div>

  <div id="auth-modal" class="modal" style="display:none">
    <div class="modal-box">
      <div class="modal-header">LOGIN</div>
      <div id="auth-error" class="auth-error" style="display:none"></div>

      <form id="login-form">
        <input type="text" name="username" placeholder="Username" autocomplete="username" maxlength="20" required>
        <input type="password" name="password" placeholder="Password" autocomplete="current-password" maxlength="40" required>
        <button type="submit" class="btn-primary">LOGIN</button>
        <div class="auth-switch">No account? <a href="#" id="show-register">Register</a></div>
      </form>

      <form id="register-form" style="display:none">
        <input type="text" name="username" placeholder="Username (2-20 chars)" autocomplete="username" maxlength="20" required>
        <input type="password" name="password" placeholder="Password (4+ chars)" autocomplete="new-password" maxlength="40" required>
        <button type="submit" class="btn-primary">REGISTER</button>
        <div class="auth-switch">Have an account? <a href="#" id="show-login">Login</a></div>
      </form>

      <div class="modal-actions">
        <button id="auth-skip" class="btn-secondary">PLAY AS GUEST</button>
        <button id="auth-cancel" class="btn-secondary">CANCEL</button>
      </div>
    </div>
  </div>

  <div id="leaderboard-modal" class="modal" style="display:none">
    <div class="modal-box modal-wide">
      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="leaderboard">LEADERBOARD</button>
        <button class="tab-btn" data-tab="personal">MY SCORES</button>
      </div>
      <div id="tab-leaderboard" class="tab-content">
        <div id="leaderboard-list" class="score-list"></div>
      </div>
      <div id="tab-personal" class="tab-content" style="display:none">
        <div id="personal-list" class="score-list"></div>
      </div>
      <div class="modal-actions">
        <button id="leaderboard-close" class="btn-secondary">CLOSE</button>
      </div>
    </div>
  </div>

  <div id="gameover-modal" class="modal" style="display:none">
    <div class="modal-box">
      <div class="modal-header">GAME OVER</div>
      <div id="gameover-score" class="gameover-stat"></div>
      <div id="gameover-rank" class="gameover-stat" style="display:none"></div>
      <div class="modal-actions">
        <button id="gameover-restart" class="btn-primary">PLAY AGAIN</button>
        <button id="gameover-menu" class="btn-secondary">MENU</button>
      </div>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/piece.js"></script>
  <script src="js/board.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/input.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
