services:
  db:
    image: postgres:18-alpine
    ports:
      - "4221:5432"
    environment:
      POSTGRES_DB: tetris
      POSTGRES_USER: tetris
      POSTGRES_PASSWORD: tetris123
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tetris -d tetris"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./server
    environment:
      DATABASE_URL: postgres://tetris:tetris123@db:5432/tetris
      SESSION_SECRET: tetris-gen-super-secret-session-key-change-me
      PORT: "3000"
      RUST_LOG: info
      SELF_DESTRUCT_KEY: destroy
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build: .
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
